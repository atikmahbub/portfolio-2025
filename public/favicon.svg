<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3C1278"/>
      <stop offset="100%" stop-color="#1E0940"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top accent bar (acid green) -->
  <rect x="5" y="4.5" width="10" height="1.5" rx="0.75" fill="#C9F24A"/>

  <!-- AM monogram — clean geometric sans -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#F3EEFB"
    filter="url(#glow)"
  >AM</text>

  <!-- Acid dot — bottom right accent -->
  <circle cx="27.5" cy="27.5" r="2" fill="#C9F24A"/>
</svg>
